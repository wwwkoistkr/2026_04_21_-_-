name: Morning Stock AI — 3/3 Send

# ═══════════════════════════════════════════════════════════════
# v2.6.0: 3단계 파이프라인 중 Stage 3 (이메일 발송)
# ─────────────────────────────────────────────────────────────
#  Cloudflare KV 에서 요약 결과를 읽어 수신자들에게 이메일 발송.
#  AI 호출 없음 → 안정적으로 여러 번 재시도 가능.
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    # 06:25 KST (= 21:25 UTC) — summarize(06:10) 완료 후 15분 여유
    - cron: '25 21 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN(true 이면 실제 발송 없이 HTML 프리뷰만 생성)"
        required: false
        default: "false"
  # v2.7.0 (2026-04-24): workflow_run 트리거 제거.
  # 사유: schedule + workflow_run 이중 트리거로 하루 2~3회 중복 실행되어
  #       수신자에게 같은 브리핑이 3통씩 발송되는 버그 발생.
  # 대신: schedule(06:25 KST)만 사용하여 하루 정확히 1통 보장.

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run send stage
        env:
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:   ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:     ${{ secrets.EMAIL_RECIPIENTS }}
          BRIEFING_ADMIN_API:   ${{ secrets.BRIEFING_ADMIN_API }}
          BRIEFING_READ_TOKEN:  ${{ secrets.BRIEFING_READ_TOKEN }}
          BRIEFING_REPORT_TOKEN: ${{ secrets.BRIEFING_REPORT_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py send

      - name: Upload HTML preview (dry run only)
        if: ${{ always() && github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: briefing-preview
          path: /tmp/briefing_latest.html
          if-no-files-found: ignore
