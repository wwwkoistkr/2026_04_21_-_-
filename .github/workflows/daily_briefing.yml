name: Morning Stock AI — Daily Briefing

on:
  schedule:
    - cron: '- cron: '30 21 * * *'
    workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN(true 이면 메일 발송 생략)"
        required: false
        default: "false"

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # v2.2.4: Node 20 deprecation 경고 억제 (GitHub Actions 런너가 Node 24 강제 사용)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run briefing pipeline
        env:
          # AI 요약 - Gemini (기본)
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          # AI 요약 - OpenAI fallback (Gemini 503/할당량 초과 시 자동 전환, v2.2.5+)
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL:      ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL:         ${{ secrets.OPENAI_MODEL }}
          # 이메일 발송
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:   ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:     ${{ secrets.EMAIL_RECIPIENTS }}
          # YouTube 수집
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          THELEC_YOUTUBE_CHANNEL_ID: ${{ secrets.THELEC_YOUTUBE_CHANNEL_ID }}
          # 관리 콘솔 연동 (수신자·소스 동기화)
          BRIEFING_ADMIN_API:   ${{ secrets.BRIEFING_ADMIN_API }}
          BRIEFING_READ_TOKEN:  ${{ secrets.BRIEFING_READ_TOKEN }}
          # 드라이런 플래그
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py

      - name: Upload HTML preview (dry run only)
        if: ${{ always() && github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: briefing-preview
          path: /tmp/briefing_latest.html
          if-no-files-found: ignore
