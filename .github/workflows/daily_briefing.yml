name: Daily Stock & Semiconductor Briefing

on:
  schedule:
    # 매일 한국시간 오전 8:00 (= UTC 23:00 전날)
    - cron: '0 23 * * *'
  # 수동 실행 버튼
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN(true 이면 메일 발송 생략)"
        required: false
        default: "false"

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run briefing pipeline
        env:
          # 필수 Secrets
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:   ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:     ${{ secrets.EMAIL_RECIPIENTS }}
          # 선택 Secrets
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          THELEC_YOUTUBE_CHANNEL_ID: ${{ secrets.THELEC_YOUTUBE_CHANNEL_ID }}
          # 수동 실행 시 DRY_RUN 반영
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py

      - name: 🧾 Upload HTML preview (dry run only)
        if: ${{ always() && github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: briefing-preview
          path: /tmp/briefing_latest.html
          if-no-files-found: ignore
